name: cap_and_gown
description: A new Flutter project for managing graduation projects.

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.1 # Required for all Firebase projects
  firebase_auth: ^5.1.1 # For user authentication
  cloud_firestore: ^5.0.2 # For the database

  # UI & Utility
  intl: ^0.19.0 # For date formatting
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
